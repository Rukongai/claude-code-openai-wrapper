version: "3.9"

services:
  claude-wrapper:
    image: ghcr.io/rukongai/claude-code-openai-wrapper:latest
    container_name: claude-wrapper
    volumes:
      - claude-config:/root
      # Optional: Mount a specific workspace directory
      # - ../workspace:/workspace
    environment:
      - PORT=8000
      # Optional: Set Claude's working directory (defaults to isolated temp dir)
      # - CLAUDE_CWD=/workspace
    labels:
      traefik.enable: "true"
      traefik.http.routers.claude-wrapper.rule: Host(`claude.yourdomain.com`)
      traefik.http.routers.claude-wrapper.entrypoints: websecure
      traefik.http.routers.claude-wrapper.tls: "true"
      traefik.http.services.claude-wrapper.loadbalancer.server.port: "8000"
    networks:
      - eden

volumes:
  claude-config:

networks:
  eden:
    external: true
